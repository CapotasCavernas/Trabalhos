<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Cadastro</title>

    <!-- CSS externo -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Formulário de Cadastro</h1>

        <!-- Método de envio -->
        <form action="#" method="POST">

            <label for="nome">Nome Completo:</label>
            <input type="text" id="nome" name="nome" required>

            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" required>

            <label for="telefone">Telefone:</label>
            <input type="tel" id="telefone" name="telefone">

            <label for="data">Data de Nascimento:</label>
            <input type="date" id="data" name="data">

            <label for="sexo">Sexo:</label>
            <select id="sexo" name="sexo">
                <option value="">Selecione</option>
                <option value="masculino">Masculino</option>
                <option value="feminino">Feminino</option>
                <option value="outro">Outro</option>
            </select>

            <label>Interesses:</label>
            <div class="checkbox-group">
                <label><input type="checkbox" name="interesse" value="tecnologia"> Tecnologia</label>
                <label><input type="checkbox" name="interesse" value="esportes"> Esportes</label>
                <label><input type="checkbox" name="interesse" value="musica"> Música</label>
            </div>

            <label for="mensagem">Mensagem:</label>
            <textarea id="mensagem" name="mensagem" rows="4"></textarea>

            <button type="submit">Enviar</button>
            <button type="reset">Limpar</button>

        </form>
    </div>

</body>
</html>
